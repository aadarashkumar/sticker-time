<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
    #container { width: 100%; height: 100%; }
    #status {
      position: fixed; top: 20px; left: 0; right: 0;
      text-align: center; color: #fff;
      font-size: 1.1rem; font-family: system-ui;
      z-index: 999; padding: 10px;
      background: rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>
  <div id="status">Step 1: Page loaded</div>
  <div id="container"></div>

  <script type="module">
    const status = document.getElementById('status');
    function log(msg) { status.textContent = msg; }

    try {
      log('Step 2: Importing MindAR...');

      import('https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js')
        .then(module => {
          log('Step 3: MindAR loaded!');
          const { MindARThree } = module;

          const mindarThree = new MindARThree({
            container: document.getElementById('container'),
            imageTargetSrc: 'targets.mind',
          });

          log('Step 4: Setting up scene...');
          const { renderer, scene, camera } = mindarThree;

          const video = document.createElement('video');
          video.src = 'bhaw.mp4';
          video.loop = true;
          video.muted = true;
          video.setAttribute('playsinline', '');
          video.setAttribute('webkit-playsinline', '');

          const anchor = mindarThree.addAnchor(0);

          anchor.onTargetFound = () => {
            log('TARGET FOUND — playing!');
            video.muted = false;
            video.play();
          };

          anchor.onTargetLost = () => {
            log('Target lost — point at sticker');
            video.pause();
          };

          log('Step 5: Starting camera...');

          mindarThree.start().then(() => {
            log('Step 6: Camera running — point at sticker!');
            renderer.setAnimationLoop(() => {
              renderer.render(scene, camera);
            });
          }).catch(err => {
            log('START ERROR: ' + err.message);
          });
        })
        .catch(err => {
          log('IMPORT ERROR: ' + err.message);
        });

    } catch(err) {
      log('CATCH ERROR: ' + err.message);
    }
  </script>
</body>
</html>
