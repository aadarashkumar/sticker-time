<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sticker Time AR</title>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>

  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif;
    }

    /* Fixed UI Homepage Cover Layer */
    #premium-landing-view {
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100vw; 
      height: 100dvh; 
      overflow: hidden; 
      z-index: 99999;
      background: #05081c url('bg-home.png') no-repeat center center;
      background-size: cover;
    }

    #interactive-overlay-plane {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
      display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box;
    }

    #start-camera-btn {
      background: url('btn-bubble.png') no-repeat center !important;
      background-size: contain !important;
      border: none !important;
      width: 280px !important; 
      height: 75px !important;
      cursor: pointer;
      margin-top: auto; 
      margin-bottom: 110px; 
      transition: transform 0.1s ease;
      background-color: transparent !important;
      outline: none !important;
      -webkit-tap-highlight-color: transparent;
      color: transparent !important;
      font-size: 0px !important;
    }

    #start-camera-btn:active {
      transform: scale(0.95);
    }

    #premium-landing-view.hide-me {
      display: none !important;
    }

    /* The Main Video Stream Tracking Container */
    #ar-container {
      width: 100vw;
      height: 100dvh;
      position: relative;
      overflow: hidden;
    }

    /* Calibrated Wide Horizontal Box for your BHAW sticker */
    #ar-overlay-item {
      display: none; /* Stays hidden until target is found */
      position: absolute;
      left: 0; top: 0;
      width: 100px;  /* Sized and tracked dynamically via JS scale multipliers */
      height: 46px; /* Matches your broad landscape ratio (1.6 : 0.75) */
      transform-origin: top left;
      z-index: 10;
      pointer-events: none;
    }

    #sticker-video {
      width: 100%;
      height: 100%;
      object-fit: fill;
    }
  </style>
</head>
<body>

  <div id="premium-landing-view">
    <div id="interactive-overlay-plane">
      <button id="start-camera-btn"></button>
    </div>
  </div>

  <div id="ar-container">
    <div id="ar-overlay-item">
      <video id="sticker-video" src="bhaw.mp4" loop playsinline webkit-playsinline muted></video>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const startBtn = document.getElementById('start-camera-btn');
      const landingScreen = document.getElementById('premium-landing-view');
      const container = document.getElementById('ar-container');
      const overlayItem = document.getElementById('ar-overlay-item');
      const stickerVid = document.getElementById('sticker-video');

      // Initialize MindAR Image Engine Controller Directly
      const mindarThree = new window.MINDAR.IMAGE.Controller({
        container: container,
        imageTargetSrc: 'targets.mind',
        uiLoading: "no",
        uiScanning: "no",
        uiError: "no"
      });

      startBtn.addEventListener('click', async () => {
        // Drop landing screen curtain instantly
        landingScreen.classList.add('hide-me');

        // Force wake video playheads for iOS background policy layers
        try {
          stickerVid.play().then(() => { stickerVid.pause(); });
        } catch(e){}

        // Fire direct hardware permissions request and begin scanning loops
        try {
          await mindarThree.addImageTargets();
          await mindarThree.start();
        } catch (err) {
          console.error("Hardware startup exception:", err);
          alert("Camera access failed. Please ensure permission is granted in your iOS Settings.");
        }
      });

      // Handle raw tracking engine position hooks frame-by-frame
      mindarThree.onUpdate = (event) => {
        if (event.type === 'updateMatrix') {
          const {targetIndex, worldMatrix} = event.options;
          
          // MindAR feeds standard raw CSS transform strings when tracked
          if (mindarThree.getCoordinateSystem) {
            const coordinateSystem = mindarThree.getCoordinateSystem();
          }
          
          // Calculate visibility states dynamically based on engine
