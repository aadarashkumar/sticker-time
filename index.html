<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Test</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.136.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/dist/mindar-image.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
    #container { width: 100%; height: 100%; }
    #status {
      position: fixed;
      top: 20px; left: 0; right: 0;
      text-align: center;
      color: #fff;
      font-size: 1.1rem;
      font-family: system-ui;
      z-index: 999;
      padding: 10px;
      background: rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>
  <div id="status">Step 1: Page loaded</div>
  <div id="container"></div>

  <script>
    const status = document.getElementById('status');

    function log(msg) {
      status.textContent = msg;
      console.log(msg);
    }

    try {
      log('Step 2: Creating MindAR...');

      const mindarThree = new MINDAR.IMAGE.MindARThree({
        container: document.getElementById('container'),
        imageTargetSrc: 'targets.mind',
      });

      log('Step 3: MindAR created, setting up scene...');

      const { renderer, scene, camera } = mindarThree;

      const video = document.createElement('video');
      video.src = 'bhaw.mp4';
      video.loop = true;
      video.muted = true;
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');

      const texture = new THREE.VideoTexture(video);
      const geometry = new THREE.PlaneGeometry(1, 1);
      const material = new THREE.MeshBasicMaterial({ map: texture });
      const plane = new THREE.Mesh(geometry, material);

      const anchor = mindarThree.addAnchor(0);
      anchor.group.add(plane);

      anchor.onTargetFound = () => {
        log('TARGET FOUND!');
        video.muted = false;
        video.play();
      };

      anchor.onTargetLost = () => {
        log('Target lost');
        video.pause();
      };

      log('Step 4: Calling mindarThree.start()...');

      mindarThree.start().then(() => {
        log('Step 5: Started! Point at sticker');
        renderer.setAnimationLoop(() => {
          renderer.render(scene, camera);
        });
      }).catch(err => {
        log('ERROR in start: ' + err.message);
      });

    } catch(err) {
      log('CATCH ERROR: ' + err.message);
    }
  </script>
</body>
</html>
