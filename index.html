<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sticker Time AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: transparent !important;
    }

    /* Fixed Landing Screen UI Layer Layout */
    #premium-landing-view {
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100vw; 
      height: 100dvh; 
      overflow: hidden; 
      z-index: 99999;
      background: url('bg-home.png') no-repeat center center;
      background-size: cover;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    #interactive-overlay-plane {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
      display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box;
    }

    #start-camera-btn {
      background: url('btn-bubble.png') no-repeat center !important;
      background-size: contain !important;
      border: none !important;
      width: 280px !important; 
      height: 75px !important;
      cursor: pointer;
      margin-top: auto; 
      margin-bottom: 110px; 
      transition: transform 0.1s ease;
      background-color: transparent !important;
      outline: none !important;
      -webkit-tap-highlight-color: transparent;
      color: transparent !important;
      font-size: 0px !important;
    }

    #start-camera-btn:active {
      transform: scale(0.95);
    }

    /* Forces the landing view completely out of existence so camera can render */
    #premium-landing-view.hide-me {
      display: none !important;
      opacity: 0 !important;
      visibility: hidden !important;
      z-index: -1000 !important;
    }

    .a-canvas {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: 1 !important;
    }
  </style>
</head>
<body>

  <div id="premium-landing-view">
    <div id="interactive-overlay-plane">
      <button id="start-camera-btn"></button>
    </div>
  </div>

  <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;" 
           color-space="sRGB" 
           renderer="colorManagement: true, physicallyCorrectLights: false" 
           vr-mode-ui="enabled: false" 
           device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <video id="sticker-video" src="bhaw.mp4" preload="auto" loop="true" playsinline webkit-playsinline></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target-handler">
      <a-video src="#sticker-video" width="1" height="0.5625" position="0 0 0" rotation="0 0 0"></a-video>
    </a-entity>

  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const startBtn = document.getElementById('start-camera-btn');
      const landingScreen = document.getElementById('premium-landing-view');
      const arScene = document.querySelector('a-scene');
      const stickerVid = document.getElementById('sticker-video');
      const targetHandler = document.getElementById('target-handler');

      startBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        event.preventDefault();

        // Remove the visual homepage curtain overlay
        landingScreen.classList.add('hide-me');

        // Fire the core camera stream natively
        if (arScene && arScene.systems['mindar-image-system']) {
          arScene.systems['mindar-image-system'].start();
        }
      });

      // Video Controls: Play only when target sticker is seen, pause when lost
      targetHandler.addEventListener("targetFound", () => {
        console.log("Sticker found! Playing video...");
        stickerVid.play().catch(err => console.log("Video playback waiting:", err));
      });

      targetHandler.addEventListener("targetLost", () => {
        console.log("Sticker lost. Pausing video.");
        stickerVid.pause();
      });
    });
  </script>

</body>
</html>
