<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>It's Sticker Time</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* ── LANDING ── */
    #landing {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      /* Button sits at 78% down the screen, matching your comp */
      padding-bottom: 18%;
    }
    #landing-bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      z-index: 0;
    }
    #start-btn {
      position: relative; z-index: 2;
      background: none; border: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      padding: 0; width: min(320px, 82vw);
    }
    #start-btn img {
      width: 100%; display: block;
      filter: drop-shadow(0 0 18px rgba(96,165,250,0.7));
      transition: transform 0.1s ease;
    }
    #start-btn:active img { transform: scale(0.93); }

    /* ── LOADING ── */
    #loader {
      position: fixed; inset: 0; z-index: 200;
      background: #000; display: none;
      flex-direction: column; align-items: center;
      justify-content: center; gap: 20px;
    }
    #loader.active { display: flex; }
    .loader-spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #2de6c1; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      color: rgba(255,255,255,0.75); font-size: 1rem;
      font-family: system-ui, sans-serif; letter-spacing: 0.04em;
    }

    /* ── AR CONTAINER (injected dynamically) ── */
    #ar-container {
      position: fixed; inset: 0; z-index: 50;
      display: none;
    }
    #ar-container.active { display: block; }

    /* Force the a-scene canvas to fill screen */
    #ar-container a-scene,
    #ar-container canvas {
      position: absolute !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
    }

    /* ── BACK BUTTON ── */
    #back-btn {
      position: fixed; top: 20px; left: 20px; z-index: 300;
      display: none;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      border: 1.5px solid rgba(255,255,255,0.3); border-radius: 50px;
      color: #fff; font-size: 0.9rem; font-weight: 700;
      padding: 9px 20px; cursor: pointer;
      font-family: system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    #back-btn.active { display: block; }

    /* ── SCAN HINT ── */
    #scan-hint {
      position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%); z-index: 300;
      display: none;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 50px;
      padding: 12px 24px; color: rgba(255,255,255,0.9);
      font-size: 0.9rem; font-family: system-ui, sans-serif;
      white-space: nowrap;
    }
    #scan-hint.active { display: block; }
  </style>
</head>
<body>

  <!-- LANDING: your assets only -->
  <div id="landing">
    <img id="landing-bg" src="bg-home.png" alt="">
    <button id="start-btn" aria-label="Start Camera">
      <img src="btn-bubble.png" alt="Start Camera">
    </button>
  </div>

  <!-- LOADING -->
  <div id="loader">
    <div class="loader-spinner"></div>
    <div class="loader-text">Starting camera…</div>
  </div>

  <!-- AR scene injected here dynamically after tap -->
  <div id="ar-container"></div>

  <!-- BACK BUTTON -->
  <button id="back-btn">← Back</button>

  <!-- SCAN HINT -->
  <div id="scan-hint">📷 Point at your sticker to play</div>

  <!-- Load MindAR scripts AFTER body so they don't block -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image-aframe.prod.js"></script>

  <script>
    const landing     = document.getElementById('landing');
    const loader      = document.getElementById('loader');
    const arContainer = document.getElementById('ar-container');
    const backBtn     = document.getElementById('back-btn');
    const scanHint    = document.getElementById('scan-hint');
    const startBtn    = document.getElementById('start-btn');

    let arScene    = null;
    let arVideo    = null;
    let arTarget   = null;
    let arRunning  = false;

    function buildAndStartAR() {
      // Dynamically build the entire a-scene HTML string
      // This guarantees the scene is created INSIDE the user-gesture call stack
      arContainer.innerHTML = `
        <a-scene
          id="ar-scene"
          mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
          color-space="sRGB"
          renderer="colorManagement: true; physicallyCorrectLights: false"
          vr-mode-ui="enabled: false"
          device-orientation-permission-ui="enabled: false"
          embedded>

          <a-assets>
            <video id="sticker-video"
              src="bhaw.mp4"
              preload="auto" loop
              playsinline webkit-playsinline
              muted crossorigin="anonymous">
            </video>
          </a-assets>

          <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

          <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
            <a-video src="#sticker-video"
              width="1" height="1"
              position="0 0 0.001">
            </a-video>
          </a-entity>

        </a-scene>
      `;

      arContainer.classList.add('active');

      // Get references to the newly created elements
      arScene  = document.getElementById('ar-scene');
      arVideo  = document.getElementById('sticker-video');
      arTarget = document.getElementById('target-entity');

      // Hide loader once AR camera stream is running
      arScene.addEventListener('arReady', () => {
        loader.classList.remove('active');
        backBtn.classList.add('active');
        scanHint.classList.add('active');
        arRunning = true;
      }, { once: true });

      // Fallback: hide loader after 12s regardless
      setTimeout(() => {
        if (loader.classList.contains('active')) {
          loader.classList.remove('active');
          backBtn.classList.add('active');
          scanHint.classList.add('active');
        }
      }, 12000);

      // Wait for scene to be ready before attaching target events
      arScene.addEventListener('loaded', () => {
        arTarget = document.getElementById('target-entity');

        arTarget.addEventListener('targetFound', () => {
          scanHint.classList.remove('active');
          arVideo.muted = false;
          arVideo.play().catch(() => {
            arVideo.muted = true;
            arVideo.play().catch(e => console.warn('Play failed:', e));
          });
        });

        arTarget.addEventListener('targetLost', () => {
          arVideo.pause();
          scanHint.classList.add('active');
        });
      }, { once: true });
    }

    function stopAR() {
      try {
        if (arScene && arScene.systems['mindar-image-system']) {
          arScene.systems['mindar-image-system'].stop();
        }
      } catch(e) {}

      if (arVideo) {
        arVideo.pause();
        arVideo.muted = true;
      }

      // Nuke the entire scene from DOM — clean slate for next time
      arContainer.innerHTML = '';
      arContainer.classList.remove('active');
      arScene   = null;
      arVideo   = null;
      arTarget  = null;
      arRunning = false;
    }

    // ── TAP: this is the iOS user gesture that unlocks camera permission ──
    startBtn.addEventListener('click', () => {
      landing.style.display = 'none';
      loader.classList.add('active');
      buildAndStartAR();
    });

    // ── BACK ──
    backBtn.addEventListener('click', () => {
      stopAR();
      backBtn.classList.remove('active');
      scanHint.classList.remove('active');
      loader.classList.remove('active');
      landing.style.display = 'flex';
    });
  </script>
</body>
</html>
