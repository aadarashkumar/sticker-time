<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html, body, a-scene { 
        margin: 0 !important; 
        padding: 0 !important; 
        width: 100% !important; 
        height: 100% !important; 
        overflow: hidden !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
      }
      canvas.a-canvas {
        width: 100% !important;
        height: 100% !important;
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
      }

      #landing {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        padding-bottom: 32%;
      }
      #landing-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
      }
      #start-btn {
        position: relative;
        z-index: 2;
        background: none;
        border: none;
        padding: 0;
        width: min(320px, 80vw);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transform: scale(1);
        transition: transform 0.12s ease;
      }
      #start-btn:active {
        transform: scale(0.9);
      }
      #start-btn img {
        width: 100%;
        display: block;
      }

      #ar-status {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 99999;
        background: rgba(0,0,0,0.75);
        color: #00ff00;
        padding: 8px 14px;
        border-radius: 20px;
        font-family: system-ui;
        font-size: 13px;
        font-weight: bold;
        display: none;
      }
    </style>
  </head>
  <body>

    <div id="ar-status">⏳ Loading...</div>

    <div id="landing">
      <video id="landing-video" autoplay loop muted playsinline webkit-playsinline>
        <source src="group1-main.mp4" type="video/mp4">
      </video>
      <button id="start-btn" onclick="startAR()">
        <img src="btn-bubble.png" alt="Start Camera">
      </button>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 10000;" 
             embedded 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      <a-assets>
        <video id="bhaw-vid" src="bhaw.mp4" loop="true" playsinline crossorigin="anonymous" webkit-playsinline muted></video>
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0" id="sticker-target">
        <a-video src="#bhaw-vid" width="1.3" height="1" position="0 0 0" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const video        = document.getElementById('bhaw-vid');
      const landing      = document.getElementById('landing');
      const arStatus     = document.getElementById('ar-status');
      const sceneEl      = document.querySelector('a-scene');

      function log(msg, color) {
        arStatus.style.display = 'block';
        arStatus.textContent = msg;
        arStatus.style.color = color || '#00ff00';
      }

      video.muted = true;
      video.pause();

      function playMagicClick() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          
          const osc1 = ctx.createOscillator();
          const gain1 = ctx.createGain();
          osc1.connect(gain1);
          gain1.connect(ctx.destination);
          osc1.type = 'sine';
          osc1.frequency.setValueAtTime(400, ctx.currentTime);
          osc1.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.15);
          gain1.gain.setValueAtTime(0.3, ctx.currentTime);
          gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
          osc1.start(ctx.currentTime);
          osc1.stop(ctx.currentTime + 0.2);

          const osc2 = ctx.createOscillator();
          const gain2 = ctx.createGain();
          osc2.connect(gain2);
          gain2.connect(ctx.destination);
          osc2.type = 'sine';
          osc2.frequency.setValueAtTime(800, ctx.currentTime + 0.05);
          osc2.frequency.exponentialRampToValueAtTime(1600, ctx.currentTime + 0.2);
          gain2.gain.setValueAtTime(0.2, ctx.currentTime + 0.05);
          gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
          osc2.start(ctx.currentTime + 0.05);
          osc2.stop(ctx.currentTime + 0.25);

        } catch(e) {
          console.log('Audio not supported:', e);
        }
      }

      function startAR() {
        playMagicClick();
        log('⏳ Starting camera...', '#ffdf00');

        setTimeout(() => {
          landing.style.display = 'none';
          video.play().then(() => {
            video.pause();
            log('📷 Scanner active — scan sticker!', '#00ff00');
            sceneEl.systems["mindar-image-system"].start();
          }).catch(err => {
            log('❌ ERROR: ' + err.message, '#ff0000');
          });
        }, 150);
      }

      const targetEntity = document.getElementById('sticker-target');

      targetEntity.addEventListener("targetFound", () => {
        log('🎉 Sticker found — playing!', '#00ff00');
        video.muted = false;
        video.play().catch(e => log('❌ Video error: ' + e.message, '#ff0000'));
      });

      targetEntity.addEventListener("targetLost", () => {
        log('🔍 Sticker lost — keep scanning', '#ffdf00');
        video.muted = true;
        video.pause();
      });

      window.addEventListener('error', function(e) {
        log('❌ JS ERROR: ' + e.message, '#ff0000');
      });
    </script>
  </body>
</html>
