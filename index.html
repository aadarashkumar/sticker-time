<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>It's Sticker Time</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image-aframe.prod.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* ── LANDING ── */
    #landing {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 60px;
    }
    #landing-bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
    }
    #start-btn {
      position: relative; z-index: 2;
      background: none; border: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      padding: 0; width: min(300px, 80vw);
    }
    #start-btn img {
      width: 100%; display: block;
      filter: drop-shadow(0 0 18px rgba(96,165,250,0.7));
      transition: transform 0.1s ease;
    }
    #start-btn:active img { transform: scale(0.93); }

    /* ── LOADING ── */
    #loader {
      position: fixed; inset: 0; z-index: 90;
      background: #000; display: none;
      flex-direction: column; align-items: center;
      justify-content: center; gap: 20px;
    }
    #loader.active { display: flex; }
    .loader-spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #2de6c1; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      color: rgba(255,255,255,0.7); font-size: 0.95rem;
      font-family: system-ui, sans-serif;
    }

    /* ── AR SCENE ── */
    #ar-wrapper {
      position: fixed; inset: 0; z-index: 10;
      visibility: hidden; pointer-events: none;
    }
    #ar-wrapper.active {
      visibility: visible; pointer-events: auto;
    }
    a-scene {
      position: absolute !important; inset: 0 !important;
      width: 100% !important; height: 100% !important;
    }

    /* ── BACK BUTTON ── */
    #back-btn {
      position: fixed; top: 20px; left: 20px; z-index: 200;
      display: none;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1.5px solid rgba(255,255,255,0.3); border-radius: 50px;
      color: #fff; font-size: 0.9rem; font-weight: 700;
      padding: 9px 20px; cursor: pointer;
      font-family: system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    #back-btn.active { display: block; }

    /* ── SCAN HINT ── */
    #scan-hint {
      position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%); z-index: 200;
      display: none;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 50px;
      padding: 12px 24px; color: rgba(255,255,255,0.9);
      font-size: 0.9rem; font-family: system-ui, sans-serif;
      white-space: nowrap;
    }
    #scan-hint.active { display: block; }
  </style>
</head>
<body>

  <!-- LANDING -->
  <div id="landing">
    <img id="landing-bg" src="bg-home.png" alt="">
    <button id="start-btn" aria-label="Start Camera">
      <img src="btn-bubble.png" alt="Start Camera">
    </button>
  </div>

  <!-- LOADING -->
  <div id="loader">
    <div class="loader-spinner"></div>
    <div class="loader-text">Starting camera…</div>
  </div>

  <!-- BACK BUTTON -->
  <button id="back-btn">← Back</button>

  <!-- SCAN HINT -->
  <div id="scan-hint">📷 Point at your sticker to play</div>

  <!-- AR SCENE -->
  <div id="ar-wrapper">
    <a-scene
      id="ar-scene"
      mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: false"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded>

      <a-assets>
        <video id="sticker-video"
          src="bhaw.mp4"
          preload="auto" loop
          playsinline webkit-playsinline
          muted crossorigin="anonymous">
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
        <a-video src="#sticker-video"
          width="1" height="1"
          position="0 0 0.001">
        </a-video>
      </a-entity>

    </a-scene>
  </div>

  <script>
    const landing      = document.getElementById('landing');
    const loader       = document.getElementById('loader');
    const arWrapper    = document.getElementById('ar-wrapper');
    const backBtn      = document.getElementById('back-btn');
    const scanHint     = document.getElementById('scan-hint');
    const startBtn     = document.getElementById('start-btn');
    const arScene      = document.getElementById('ar-scene');
    const video        = document.getElementById('sticker-video');
    const targetEntity = document.getElementById('target-entity');

    function showAR() {
      loader.classList.remove('active');
      arWrapper.classList.add('active');
      backBtn.classList.add('active');
      scanHint.classList.add('active');
    }

    function hideAR() {
      try { arScene.systems['mindar-image-system'].stop(); } catch(e) {}
      video.pause();
      video.currentTime = 0;
      video.muted = true;
      arWrapper.classList.remove('active');
      backBtn.classList.remove('active');
      scanHint.classList.remove('active');
      landing.style.display = 'flex';
    }

    startBtn.addEventListener('click', () => {
      landing.style.display = 'none';
      loader.classList.add('active');
      arWrapper.classList.add('active');

      const poll = setInterval(() => {
        const sys = arScene.systems && arScene.systems['mindar-image-system'];
        if (sys) {
          clearInterval(poll);
          sys.start()
            .then(() => showAR())
            .catch(() => showAR());
        }
      }, 200);

      setTimeout(() => {
        clearInterval(poll);
        if (loader.classList.contains('active')) showAR();
      }, 15000);
    });

    targetEntity.addEventListener('targetFound', () => {
      scanHint.classList.remove('active');
      video.muted = false;
      video.play().catch(() => {
        video.muted = true;
        video.play().catch(e => console.warn('Play failed:', e));
      });
    });

    targetEntity.addEventListener('targetLost', () => {
      video.pause();
      scanHint.classList.add('active');
    });

    backBtn.addEventListener('click', hideAR);
  </script>
</body>
</html>
