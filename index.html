<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>V1 Clone Baseline Test</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* Reset layout limits to ensure the camera feed fits perfectly */
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000;
    }
  </style>
</head>
<body>

  <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes;" 
           color-space="sRGB" 
           renderer="colorManagement: true, physicallyCorrectLights: false" 
           vr-mode-ui="enabled: false" 
           device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <video id="sticker-video" src="bhaw.mp4" preload="auto" loop playsinline webkit-playsinline muted></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target-handler">
      <a-video src="#sticker-video" width="1.6" height="0.75" position="0 0 0" rotation="0 0 0"></a-video>
    </a-entity>

  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const stickerVid = document.getElementById('sticker-video');
      const targetHandler = document.getElementById('target-handler');

      // Unmute and play immediately when target sticker is detected
      targetHandler.addEventListener("targetFound", () => {
        console.log("Target found!");
        stickerVid.muted = false;
        stickerVid.play().catch(err => console.log("Video playback error:", err));
      });

      // Pause when the sticker moves out of camera sight
      targetHandler.addEventListener("targetLost", () => {
        console.log("Target lost.");
        stickerVid.pause();
      });
    });
  </script>

</body>
</html>
