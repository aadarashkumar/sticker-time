<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html, body, a-scene { 
        margin: 0 !important; 
        padding: 0 !important; 
        width: 100% !important; 
        height: 100% !important; 
        overflow: hidden !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
      }
      canvas.a-canvas {
        width: 100% !important;
        height: 100% !important;
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
      }
      .btn-overlay { 
        position: fixed; 
        top: 25px; 
        left: 25px; 
        z-index: 99999; 
        background: rgba(0,0,0,0.85); 
        color: white; 
        padding: 15px; 
        border-radius: 8px; 
        font-family: sans-serif; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }
      .start-btn { 
        background: #FFDF00; 
        border: none; 
        padding: 12px 24px; 
        font-weight: bold; 
        border-radius: 5px; 
        cursor: pointer; 
        width: 100%; 
        margin-top: 10px; 
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="btn-overlay">
      <div id="status" style="font-weight: bold; font-size: 14px;">1. Tap to Start:</div>
      <button onclick="armSystem()" class="start-btn">ACTIVATE CAMERA 🔊</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.001; filterBeta: 1000;" 
             embedded 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      <a-assets>
        <video id="bhaw-vid" src="bhaw.mp4" loop="true" playsinline crossorigin="anonymous" webkit-playsinline></video>
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0" id="sticker-target">
        <a-video src="#bhaw-vid" width="1.3" height="1" position="0 0 0" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.getElementById('bhaw-vid');
      const statusText = document.getElementById('status');
      const sceneEl = document.querySelector('a-scene');
      video.pause();

      function armSystem() {
        video.play().then(() => { 
          video.pause(); 
          statusText.innerText = "2. Scanner Active! Scan Sticker.";
          statusText.style.color = "#00ff00";
          sceneEl.systems["mindar-image-system"].start();
        }).catch(err => {
          console.log("Hardware activation failed:", err);
        });
      }

      const targetEntity = document.getElementById('sticker-target');
      
      targetEntity.addEventListener("targetFound", event => {
        statusText.innerText = "STICKER MATCHED! 🎉";
        statusText.style.color = "#00ff00";
        video.play().catch(e => console.log("Video block:", e));
      });

      targetEntity.addEventListener("targetLost", event => {
        statusText.innerText = "Scanning for Sticker...";
        statusText.style.color = "#ffdf00";
        video.pause();
      });
    </script>
  </body>
</html>
