<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sticker Time AR</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* Absolute system reset ensuring layouts remain completely transparent */
    body, html, a-scene {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent !important; background-color: transparent !important;
    }

    /* Fixed UI Homepage Cover Layer Layout */
    #premium-landing-view {
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100vw; 
      height: 100dvh; 
      overflow: hidden; 
      z-index: 99999;
      background: #05081c url('bg-home.png') no-repeat center center;
      background-size: cover;
    }

    #interactive-overlay-plane {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
      display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box;
    }

    #start-camera-btn {
      background: url('btn-bubble.png') no-repeat center !important;
      background-size: contain !important;
      border: none !important;
      width: 280px !important; 
      height: 75px !important;
      cursor: pointer;
      margin-top: auto; 
      margin-bottom: 110px; 
      transition: transform 0.1s ease;
      background-color: transparent !important;
      outline: none !important;
      -webkit-tap-highlight-color: transparent;
      color: transparent !important;
      font-size: 0px !important;
    }

    #start-camera-btn:active {
      transform: scale(0.95);
    }

    #premium-landing-view.hide-me {
      display: none !important;
    }
  </style>
</head>
<body>

  <div id="premium-landing-view">
    <div id="interactive-overlay-plane">
      <button id="start-camera-btn"></button>
    </div>
  </div>

  <a-scene id="ar-scene-root"
           color-space="sRGB" 
           renderer="colorManagement: true, physicallyCorrectLights: false" 
           vr-mode-ui="enabled: false" 
           device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <video id="sticker-video" src="bhaw.mp4" preload="auto" loop playsinline webkit-playsinline muted></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target-handler">
      <a-video src="#sticker-video" width="1.6" height="0.75" position="0 0 0" rotation="0 0 0"></a-video>
    </a-entity>

  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const startBtn = document.getElementById('start-camera-btn');
      const landingScreen = document.getElementById('premium-landing-view');
      const arScene = document.getElementById('ar-scene-root');
      const stickerVid = document.getElementById('sticker-video');
      const targetHandler = document.getElementById('target-handler');
