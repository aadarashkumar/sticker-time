<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sticker Time AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* Forces absolute layout transparency across your device screen container */
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: transparent !important;
    }

    /* UI Homepage Cover Layer Style Properties */
    #premium-landing-view {
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100vw; 
      height: 100dvh; 
      overflow: hidden; 
      z-index: 99999;
      background: #05081c url('bg-home.png') no-repeat center center;
      background-size: cover;
    }

    #interactive-overlay-plane {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
      display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box;
    }

    #start-camera-btn {
      background: url('btn-bubble.png') no-repeat center !important;
      background-size: contain !important;
      border: none !important;
      width: 280px !important; 
      height: 75px !important;
      cursor: pointer;
      margin-top: auto; 
      margin-bottom: 110px; 
      transition: transform 0.1s ease;
      background-color: transparent !important;
      outline: none !important;
      -webkit-tap-highlight-color: transparent;
      color: transparent !important;
      font-size: 0px !important;
    }

    #start-camera-btn:active {
      transform: scale(0.95);
    }

    /* Completely detaches the landing elements out of the rendering hierarchy */
    #premium-landing-view.hide-me {
      display: none !important;
      opacity: 0 !important;
      visibility: hidden !important;
      z-index: -1000 !important;
    }

    /* Correctly constrains the A-Frame output workspace canvas space */
    .AR-Frame-Stage-View {
      width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1;
    }
  </style>
</head>
<body>

  <div id="premium-landing-view">
    <div id="interactive-overlay-plane">
      <button id="start-camera-btn"></button>
    </div>
  </div>

  <div class="AR-Frame-Stage-View">
    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: false;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: false" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="sticker-video" src="bhaw.mp4" preload="auto" loop playsinline webkit-playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target-handler">
        <a-video src="#sticker-video" width="1.6" height="0.75" position="0 0 0" rotation="0 0 0"></a-video>
      </a-entity>

    </a-scene>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const startBtn = document.getElementById('start-camera-btn');
      const landingScreen = document.getElementById('premium-landing-view');
      const arScene = document.querySelector('a-scene');
      const stickerVid = document.getElementById('sticker-video');
      const targetHandler = document.getElementById('target-handler');

      startBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        event.preventDefault();

        // Step A: Pull down the homepage cover artwork layout out of frame
        landingScreen.classList.add('hide-me');

        // Step B: Unblock media background playback for iOS video elements
        try {
          stickerVid.play().then(() => {
            stickerVid.pause();
          }).catch(e => console.log("Video track unblock skipped"));
        } catch(err) {}

        // Step C: Directly initiate camera stream tracking loops
        if (arScene && arScene.systems['mindar-image-system']) {
          try {
            arScene.systems['mindar-image-system'].start();
          } catch(arErr) {
            console.error("Camera layout startup panic:", arErr);
          }
        }
      });

      // Target Tracking Interaction States
      targetHandler.addEventListener("targetFound", () => {
        console.log("Sticker target match detected!");
        stickerVid.muted = false; 
        stickerVid.play().catch(err => console.log("Playback lag handler:", err));
      });

      targetHandler.addEventListener("targetLost", () => {
        console.log("Sticker track visibility lost.");
        stickerVid.pause();
      });
    });
  </script>

</body>
</html>
